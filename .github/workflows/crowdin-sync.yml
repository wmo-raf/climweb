name: Sync translations from Crowdin (production)

on:
  schedule:
    - cron: "0 */3 * * *"  # every 3 hours
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout locale_community branch
        uses: actions/checkout@v4
        with:
          ref: locale_community
          fetch-depth: 0

      - name: Install Crowdin CLI
        run: |
          curl -L https://github.com/crowdin/crowdin-cli/releases/latest/download/crowdin-cli.zip -o crowdin.zip
          unzip  -o crowdin.zip
          sudo mv */crowdin-cli.jar /usr/local/bin/crowdin-cli.jar

      - name: Check jar exists
        run: ls -l /usr/local/bin/

      - name: Debug files
        run: |
          ls -R
          
      - name: Download translations
        run: |
          java -jar /usr/local/bin/crowdin-cli.jar download \
            --token $CROWDIN_TOKEN \
            --project-id 672958
        env:
          CROWDIN_TOKEN: ${{ secrets.CROWDIN_TOKEN }}

      - name: Detect changed files
        id: changes
        run: |
          git add .
          git diff --cached --name-only > changed_files.txt

          if [ ! -s changed_files.txt ]; then
            echo "No changes"
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Stop if no changes
        if: steps.changes.outputs.skip == 'true'
        run: exit 0

      # -------------------------------
      # STEP 1: Get ALL Crowdin files with IDs
      # -------------------------------
      - name: Fetch Crowdin file list
        run: |
          curl -s \
            -H "Authorization: Bearer $CROWDIN_TOKEN" \
            "https://api.crowdin.com/api/v2/projects/672958/files?limit=500" \
            > files.json

      # -------------------------------
      # STEP 2: Map local file → Crowdin fileId
      # -------------------------------
      - name: Map changed files to file IDs
        run: |
          python3 <<EOF
          import json, os
          
          files_data = json.load(open("files.json"))
          mapping = {}
          
          for f in files_data.get("data", []):
              data = f["data"]
              path = data.get("path", "").lstrip("/")
              mapping[path] = data.get("id")
          
          changed = open("changed_files.txt").read().splitlines()
          file_ids = set()
          
          for cf in changed:
              for path, fid in mapping.items():
                  if cf.endswith(path):
                      file_ids.add(fid)
          
          open("file_ids.txt", "w").write("\n".join(map(str, file_ids)))
          EOF

      # -------------------------------
      # STEP 3: Get translations per file
      # -------------------------------
      - name: Fetch translation contributors
        run: |
          > translations.json

          while read fid; do
            [ -z "$fid" ] && continue

            curl -s \
              -H "Authorization: Bearer $CROWDIN_TOKEN" \
              "https://api.crowdin.com/api/v2/projects/672958/translations?fileId=$fid&limit=500" \
              >> translations.json
          done < file_ids.txt

      # -------------------------------
      # STEP 4: Extract unique user IDs
      # -------------------------------
      - name: Extract user IDs
        run: |
          python3 <<EOF
          import json
          
          user_ids = set()
          
          try:
              raw = open("translations.json").read()
              chunks = raw.strip().split("}{")
          
              for i, chunk in enumerate(chunks):
                  if not chunk.startswith("{"):
                      chunk = "{" + chunk
                  if not chunk.endswith("}"):
                      chunk = chunk + "}"
          
                  data = json.loads(chunk)
          
                  for item in data.get("data", []):
                      user = item.get("data", {}).get("user", {})
                      if user.get("id"):
                          user_ids.add(user["id"])
          
          except Exception as e:
              print("Error parsing translations:", e)
          
          open("user_ids.txt", "w").write("\n".join(map(str, user_ids)))
          EOF

      # -------------------------------
      # STEP 5: Map user → name/email
      # -------------------------------
      - name: Build co-authors list
        run: |
          > coauthors.txt

          while read uid; do
            [ -z "$uid" ] && continue

            response=$(curl -s \
              -H "Authorization: Bearer $CROWDIN_TOKEN" \
              "https://api.crowdin.com/api/v2/users/$uid")

            name=$(echo "$response" | python3 -c "import sys, json; print(json.load(sys.stdin)['data'].get('fullName',''))")
            email=$(echo "$response" | python3 -c "import sys, json; print(json.load(sys.stdin)['data'].get('email',''))")

            if [ -n "$name" ] && [ -n "$email" ]; then
              echo "Co-authored-by: $name <$email>" >> coauthors.txt
            fi
          done < user_ids.txt

          sort -u coauthors.txt -o coauthors.txt

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          base: locale_community
          branch: patch
          title: "Update translations from Crowdin"
          body: |
            Automated translation update from Crowdin.
          commit-message: |
            Update translations from Crowdin
      
            $(cat coauthors.txt)
