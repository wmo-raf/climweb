name: Sync translations from Crowdin (production)

on:
  schedule:
    - cron: "0 */3 * * *"  # every 3 hours
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout locale_community branch
        uses: actions/checkout@v4
        with:
          ref: locale_community
          fetch-depth: 0

      - name: Install Crowdin CLI
        run: |
          mkdir -p /tmp/crowdin
          cd /tmp/crowdin
          curl -L https://github.com/crowdin/crowdin-cli/releases/latest/download/crowdin-cli.zip -o crowdin.zip
          unzip -o crowdin.zip
          sudo mv */crowdin-cli.jar /usr/local/bin/crowdin-cli.jar

      - name: Download translations
        run: |
          java -jar /usr/local/bin/crowdin-cli.jar download \
            --token $CROWDIN_TOKEN \
            --project-id 672958
        env:
          CROWDIN_TOKEN: ${{ secrets.CROWDIN_TOKEN }}

      - name: Detect changed files
        id: changes
        run: |
          git add .
          git diff --cached --name-only > changed_files.txt

          if [ ! -s changed_files.txt ]; then
            echo "No changes"
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Stop if no changes
        if: steps.changes.outputs.skip == 'true'
        run: exit 0


      # -------------------------------
      # Get project members (translators)
      # -------------------------------
      - name: Fetch members
        run: |
          curl -s \
            -H "Authorization: Bearer $CROWDIN_TOKEN" \
            "https://api.crowdin.com/api/v2/projects/672958/members?limit=500" \
            > members.json
        env:
          CROWDIN_TOKEN: ${{ secrets.CROWDIN_TOKEN }}


      # -------------------------------
      # Build co-authors + contributors
      # -------------------------------
      - name: Build contributors and co-authors
        run: |
          python3 <<'EOF'
          import json, re
          
          data = json.load(open("members.json"))
          
          coauthors = set()
          contributors = {}
          
          def generate_candidates(name):
              base = name.lower()
              base = re.sub(r'[^a-z0-9 ]', '', base)
              parts = base.split()
          
              if not parts:
                  return []
          
              candidates = set()
          
              if len(parts) == 1:
                  candidates.add(parts[0])
              else:
                  candidates.add("".join(parts))      # graceamondi
                  candidates.add("-".join(parts))     # grace-amondi
                  candidates.add("_".join(parts))     # grace_amondi
          
              return list(candidates)
          
          for m in data.get("data", []):
              d = m.get("data", {})
              role = d.get("role")
          
              if role != "translator":
                  continue
          
              user = d.get("user", {})
              name = user.get("fullName")
              uid = user.get("id")
          
              if not name:
                  continue
          
              # Guess GitHub username
              candidates = generate_candidates(name)
          
              gh_username = None
              for c in candidates:
                  if "-" in c:
                      gh_username = c
                      break
          
              if not gh_username and candidates:
                  gh_username = candidates[0]
          
              if gh_username:
                  email = f"{gh_username}@users.noreply.github.com"
              else:
                  email = f"{uid}+crowdin@users.noreply.github.com"
          
              coauthors.add(f"Co-authored-by: {name} <{email}>")
          
              # Add to contributors list
              contributors[name] = True
          
          # Write co-authors
          with open("coauthors.txt", "w") as f:
              f.write("\n".join(sorted(coauthors)))
          
          # Write PR contributors
          with open("contributors.md", "w") as f:
              f.write("### 🌍 Translation Contributors\n\n")
              for name in sorted(contributors.keys()):
                  f.write(f"- {name}\n")
          EOF


      # -------------------------------
      # Create Pull Request
      # -------------------------------
      
      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          base: locale_community
          branch: patch
          title: "Update translations from Crowdin"
          body: |
            Automated translation update from Crowdin.
            
            $(cat contributors.md)
          commit-message: |
            Update translations from Crowdin
      
            $(cat coauthors.txt)
