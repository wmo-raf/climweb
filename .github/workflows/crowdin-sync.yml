name: Sync translations from Crowdin

on:
  schedule:
    - cron: "0 * * * *"  # every hour
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install Crowdin CLI
        run: |
          curl -L https://github.com/crowdin/crowdin-cli/releases/latest/download/crowdin-cli.zip -o crowdin.zip
          unzip crowdin.zip
          sudo mv crowdin /usr/local/bin/

      - name: Download translations
        run: crowdin download
        env:
          CROWDIN_TOKEN: ${{ secrets.CROWDIN_TOKEN }}

      - name: Get contributors
        id: contributors
        run: |
          curl -s \
            -H "Authorization: Bearer $CROWDIN_TOKEN" \
            "https://api.crowdin.com/api/v2/projects/nmhs-cms/members" \
            > contributors.json

          python3 <<EOF
            import json
            data = json.load(open("contributors.json"))
            authors = []
            for m in data.get("data", []):
                user = m["data"].get("user", {})
                name = user.get("fullName")
                email = user.get("email")
                if name and email:
                    authors.append(f"Co-authored-by: {name} <{email}>")
            
            print("\\n".join(authors))
            EOF > coauthors.txt

      - name: Commit changes
        run: |
          git config user.name "crowdin-bot"
          git config user.email "crowdin@users.noreply.github.com"

          git add .

          if git diff --cached --quiet; then
            echo "No changes"
            exit 0
          fi

          MESSAGE="Update translations from Crowdin

          $(cat coauthors.txt)"
          
          git commit -m "$MESSAGE"
          git push
