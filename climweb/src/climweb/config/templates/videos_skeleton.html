<style>
  .media-skeleton-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1rem;
    align-items: stretch;
  }

  /* ── FEATURED SKELETON ── */
  .media-skel-featured {
    background: #fff;
    border: 1px solid #eee;
    border-radius: var(--border-radius);
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  .media-skel-feat-thumb {
    width: 100%;
    aspect-ratio: 16 / 9;
    position: relative;
    overflow: hidden;
    flex-shrink: 0;
  }

  .media-skel-feat-body {
    padding: 1.25rem;
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .media-skel-feat-footer {
    padding: 10px 1.25rem;
    border-top: 1px solid #f0f0f0;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
  }

  /* ── ROWS SKELETON ── */
  .media-skel-rows {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .media-skel-row {
    background: #fff;
    border: 1px solid #eee;
    border-radius: var(--border-radius);
    overflow: hidden;
    display: flex;
    align-items: stretch;
    flex: 1;
    height: 120px;
  }

  .media-skel-row-thumb {
    width: 150px;
    flex-shrink: 0;
    overflow: hidden;
    position: relative;
  }

  .media-skel-row-body {
    flex: 1;
    padding: 10px 14px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    gap: 6px;
    border-right: 1px solid #f0f0f0;
  }

  .media-skel-row-right {
    padding: 0 12px;
    display: flex;
    align-items: center;
    gap: 8px;
    flex-shrink: 0;
  }

  /* ── SHIMMER ── */
  .skel {
    background: linear-gradient(90deg, #f0f0f0 25%, #e4e9f0 50%, #f0f0f0 75%);
    background-size: 200% 100%;
    animation: shimmer 1.4s infinite;
    border-radius: calc(var(--border-radius) / 3);
  }

  .skel-dark {
    background: linear-gradient(90deg, #d0d8e4 25%, #bcc8d8 50%, #d0d8e4 75%);
    background-size: 200% 100%;
    animation: shimmer 1.4s infinite;
    border-radius: calc(var(--border-radius) / 3);
  }

  .skel-circle {
    border-radius: 50% !important;
  }

  .skel-pill {
    border-radius: 20px !important;
  }

  @keyframes shimmer {
    0%   { background-position: 200% 0; }
    100% { background-position: -200% 0; }
  }

  /* ── RESPONSIVE ── */
  @media (max-width: 1024px) {
    .media-skeleton-grid { grid-template-columns: 1fr; }
  }

  @media (max-width: 768px) {
    .media-skel-row { flex-direction: column; height: auto; }
    .media-skel-row-thumb { width: 100%; height: 160px; }
    .media-skel-row-body { border-right: none; border-bottom: 1px solid #f0f0f0; }
    .media-skel-row-right { padding: 10px 14px; justify-content: space-between; }
  }
</style>
