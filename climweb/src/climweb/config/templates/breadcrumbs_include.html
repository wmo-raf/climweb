{% if self.get_ancestors %}
<nav class="bc-nav" aria-label="breadcrumbs">
  <div class="container">
    <ol class="bc-list">

      {% for page in self.get_ancestors %}
        {% if page.is_root == False %}
          <li class="bc-item">
            <a href="{{ page.url }}" class="bc-link">{{ page.title }}</a>
            <span class="bc-sep" aria-hidden="true">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <polyline points="9 18 15 12 9 6"/>
              </svg>
            </span>
          </li>
        {% endif %}
      {% endfor %}

      <li class="bc-item bc-item--active" aria-current="page">
        {{ self.title }}
      </li>

    </ol>
  </div>
</nav>
{% endif %}
