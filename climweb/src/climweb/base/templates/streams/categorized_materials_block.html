{% load static wagtailiconchooser_tags i18n %}

<div class="mat-card">

  <!-- HEADER -->
  <div class="mat-card-header">
    <div class="mat-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
        <path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/>
        <polyline points="14 2 14 8 20 8"/>
        <line x1="16" y1="13" x2="8" y2="13"/>
        <line x1="16" y1="17" x2="8" y2="17"/>
        <polyline points="10 9 9 9 8 9"/>
      </svg>
    </div>
    <span class="mat-category">{{ value.category }}</span>
  </div>

  <!-- FILE LIST -->
  <div class="mat-files">
    {% for item in value.materials %}
      <a class="mat-link"
         href="{% if item.document %}{{ item.document.url }}{% else %}{{ item.image.file.url }}{% endif %}"
         download="{{ item.title }}"
         data-ga-action="download"
         data-ga-event-category="Materials download"
         data-ga-event-label="{{ page.title }}"
         data-ga-value="{{ item.title }}">

        <span class="mat-link-name">{{ item.title }}</span>

        <div class="mat-dl-btn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/>
            <polyline points="7 10 12 15 17 10"/>
            <line x1="12" y1="15" x2="12" y2="3"/>
          </svg>
        </div>

      </a>
    {% endfor %}
  </div>

</div>
