{% load i18n wagtailcore_tags %}

  <div class="container">
    <div class="columns is-centered">
      <div class="column is-three-quarters-desktop is-full-mobile">

        {% if value.title %}
          <h2 class="ac-title has-text-centered">{{ value.title }}</h2>
        {% endif %}

        <div class="ac-wrap" id="{{ block.id }}">
          {% for block in value.collapsibles %}
            {% if forloop.first %}
              {% include_block block with is_first=True %}
            {% else %}
              {% include_block block with is_first=False %}
            {% endif %}
          {% endfor %}
        </div>

      </div>
    </div>
  </div>
