<style>
  .cf-skeleton {
    background: #fff;
    border: 1px solid #eee;
    border-radius: 12px;
    overflow: hidden;
  }

  /* TOP BAR SKELETON */
  .cf-skeleton-topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 9px 14px;
    border-bottom: 1px solid #f0f0f0;
    gap: 12px;
  }

  .cf-skeleton-topbar-left {
    display: flex;
    align-items: center;
    gap: 10px;
    flex: 1;
  }

  /* DAY TABS SKELETON */
  .cf-skeleton-tabs {
    display: flex;
    border-bottom: 1px solid #f0f0f0;
    overflow: hidden;
  }

  .cf-skeleton-tab {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 4px;
    padding: 7px 6px;
    border-right: 1px solid #f5f5f5;
    border-bottom: 2px solid transparent;
  }

  .cf-skeleton-tab:last-child { border-right: none; }

  .cf-skeleton-tab.active {
    border-bottom-color: var(--primary-color);
    background: #f0f6ff;
  }

  /* SLIDES SKELETON */
  .cf-skeleton-slides {
    display: flex;
    gap: 8px;
    padding: 10px 12px;
    background: #f8f9fb;
    border-top: 1px solid #f0f0f0;
    overflow: hidden;
  }

  .cf-skeleton-slide {
    flex: 1;
    background: #fff;
    border: 1px solid #eee;
    border-radius: 10px;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    align-items: center;
    min-width: 0;
  }

  .cf-skeleton-slide-hdr {
    width: 100%;
    height: 24px;
    background: var(--background-color) 33;
  }

  .cf-skeleton-slide-body {
    padding: 8px 6px 6px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    width: 100%;
  }

  .cf-skeleton-icon-wrap {
    width: 36px;
    height: 36px;
    border-radius: 8px;
    background: var(--background-color) 33;
  }

  .cf-skeleton-label {
    width: 60%;
    height: 7px;
    border-radius: 3px;
    background: #f0f0f0;
  }

  .cf-skeleton-params {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 3px;
    width: 100%;
  }

  .cf-skeleton-param {
    height: 18px;
    border-radius: 4px;
    background: #f4f6f9;
  }

  /* SHIMMER ANIMATION */
  .shimmer {
    background: linear-gradient(90deg, #f0f0f0 25%, #e0e8f0 50%, #f0f0f0 75%);
    background-size: 200% 100%;
    animation: shimmer 1.4s infinite;
  }

  .shimmer-blue {
    background: linear-gradient(90deg, var(--background-color) 33 25%, var(--background-color) 66 50%, var(--background-color) 33 75%);
    background-size: 200% 100%;
    animation: shimmer 1.4s infinite;
  }

  @keyframes shimmer {
    0%   { background-position: 200% 0; }
    100% { background-position: -200% 0; }
  }
</style>

<div class="cf-skeleton">

  <!-- TOP BAR SKELETON -->
  <div class="cf-skeleton-topbar">
    <div class="cf-skeleton-topbar-left">
      <!-- city name -->
      <div style="display:flex;align-items:center;gap:6px;">
        <div class="shimmer-blue" style="width:12px;height:12px;border-radius:50%;flex-shrink:0;"></div>
        <div class="shimmer" style="width:80px;height:10px;border-radius:4px;"></div>
      </div>
      <!-- detail btn -->
      <div class="shimmer" style="width:50px;height:22px;border-radius:6px;"></div>
    </div>
    <!-- search -->
    <div class="shimmer" style="flex:1;max-width:220px;height:30px;border-radius:8px;"></div>
    <!-- full forecast link -->
    <div class="shimmer" style="width:80px;height:10px;border-radius:4px;flex-shrink:0;"></div>
  </div>

  <!-- DAY TABS SKELETON -->
  <div class="cf-skeleton-tabs">
    <div class="cf-skeleton-tab active">
      <div class="shimmer-blue" style="width:28px;height:8px;border-radius:3px;"></div>
      <div class="shimmer-blue" style="width:36px;height:7px;border-radius:3px;opacity:0.6;"></div>
    </div>
    <div class="cf-skeleton-tab">
      <div class="shimmer" style="width:20px;height:8px;border-radius:3px;"></div>
      <div class="shimmer" style="width:36px;height:7px;border-radius:3px;"></div>
    </div>
    <div class="cf-skeleton-tab">
      <div class="shimmer" style="width:20px;height:8px;border-radius:3px;"></div>
      <div class="shimmer" style="width:36px;height:7px;border-radius:3px;"></div>
    </div>
    <div class="cf-skeleton-tab">
      <div class="shimmer" style="width:20px;height:8px;border-radius:3px;"></div>
      <div class="shimmer" style="width:36px;height:7px;border-radius:3px;"></div>
    </div>
    <div class="cf-skeleton-tab">
      <div class="shimmer" style="width:20px;height:8px;border-radius:3px;"></div>
      <div class="shimmer" style="width:36px;height:7px;border-radius:3px;"></div>
    </div>
    <div class="cf-skeleton-tab">
      <div class="shimmer" style="width:20px;height:8px;border-radius:3px;"></div>
      <div class="shimmer" style="width:36px;height:7px;border-radius:3px;"></div>
    </div>
    <div class="cf-skeleton-tab">
      <div class="shimmer" style="width:20px;height:8px;border-radius:3px;"></div>
      <div class="shimmer" style="width:36px;height:7px;border-radius:3px;"></div>
    </div>
  </div>

  <!-- HOURLY SLIDES SKELETON -->
  <div class="cf-skeleton-slides">
    {% for i in "123456" %}
    <div class="cf-skeleton-slide">
      <div class="cf-skeleton-slide-hdr shimmer-blue"></div>
      <div class="cf-skeleton-slide-body">
        <div class="cf-skeleton-icon-wrap shimmer"></div>
        <div class="cf-skeleton-label shimmer"></div>
        <div class="cf-skeleton-params">
          <div class="cf-skeleton-param shimmer"></div>
          <div class="cf-skeleton-param shimmer"></div>
          <div class="cf-skeleton-param shimmer"></div>
          <div class="cf-skeleton-param shimmer"></div>
        </div>
      </div>
    </div>
    {% endfor %}
  </div>

</div>
