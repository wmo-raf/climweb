{% load static i18n wagtailiconchooser_tags %}

<div class="pub-filter">

  {% if filters.year %}
    <div class="pub-filter-group">
      <div class="pub-filter-header">
        <span>{% translate "Year" %}</span>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polyline points="6 9 12 15 18 9"/>
        </svg>
      </div>
      <div class="pub-filter-body">
        {% for date in filters.year reversed %}
          <label class="pub-filter-check" for="yr-{{ date.year }}">
            <input type="checkbox"
                   id="yr-{{ date.year }}"
                   name="year"
                   value="{{ date.year }}"
                   class="product-filter year">
            <span class="pub-checkmark"></span>
            <span class="pub-filter-label">{{ date.year }}</span>
          </label>
        {% endfor %}
      </div>
    </div>
  {% endif %}

  {% if filters.month %}
    <div class="pub-filter-group">
      <div class="pub-filter-header">
        <span>{% translate "Month" %}</span>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polyline points="6 9 12 15 18 9"/>
        </svg>
      </div>
      <div class="pub-filter-body">
        {% for month_num, month_name in filters.month.items %}
          <label class="pub-filter-check" for="mo-{{ month_num }}">
            <input type="checkbox"
                   id="mo-{{ month_num }}"
                   name="month"
                   value="{{ month_num }}"
                   class="product-filter month">
            <span class="pub-checkmark"></span>
            <span class="pub-filter-label">{{ month_name }}</span>
          </label>
        {% endfor %}
      </div>
    </div>
  {% endif %}

</div>
